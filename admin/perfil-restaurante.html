<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keru</title>
    <link rel="icon" href="../images/isotipo-keru-nobg.png">
    <link rel="stylesheet" href="../css/style-perfil.css">
</head>

<body>
    <div class="admin-container">

        <aside class="sidebar">
            <h2 id="nRest"></h2>
            <h2></h2>
            <nav class="menu-list">
                <a href=""><button>Produtos</button></a>
                <a href="cardapio-admin.html"><button>Cardapio</button></a>
            </nav>
        </aside>

        <div class="perfil-container">
            <h2>Seu Restaurante</h2>
            <p class="subtitle">Gerencie as informações públicas do seu restaurante</p>

            <form class="perfil-form">

                <div class="avatar-upload">
                    <div class="avatar-preview">
                        <img id="previewLogo" src="" alt="Logo"
                            style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
                        </div>
                    <label for="inputLogo" class="btn-secondary">Alterar Logo</label>
                    <input type="file" id="inputLogo" accept="image/*" style="display: none;"
                        onchange="previewImagem(this)">
                </div>


                <div class="form-group">
                    <label for="restaurant-name">Nome do Restaurante</label>
                    <input type="text" id="perfilNome" placeholder="Ex: Pizzaria do Jhow">
                </div>


                <div class="form-group">
                    <label for="perfilDesc">Descrição</label>
                    <textarea id="perfilDesc" rows="4"
                        placeholder="Conte um pouco sobre o seu restaurante, especialidades, etc..."></textarea>
                </div>


                <div class="form-group">
                    <label for="restaurant-category">Categoria</label>
                    <select id="perfilCategoria">
                    </select>
                </div>
                <div class="botoes">
                    <button type="button" id="btnAlterar" class="btn-perfil" onclick="alterarPerfil()">Alterar</button>
                    <button type="button" id="btnSalvar" class="btn-perfil" onclick="salvarPerfil()" style="display:none;">Salvar
                        Alterações</button>
                    <button type="button" id="btnCancelar" class="btn-perfil" onclick="cancelarEdicao()"
                        style="display:none;">Cancelar</button>
                </div>
            </form>
        </div>

        <script src="../js/cardapio-admin.js"></script>
        <script src="../js/admin.js"></script>

</body>

</html>
