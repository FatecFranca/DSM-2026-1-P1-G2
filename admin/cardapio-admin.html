<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keru</title>
  <link rel="icon" href="../images/isotipo-keru-nobg.png">
  <link rel="stylesheet" href="../css/cardapio.css">
</head>
<body>

<div class="admin-container">

  <aside class="sidebar">
    <nav class="menu-list">
      <button>Produtos</button>
      <a href="perfil-restaurante.html"><button>Perfil</button></a>
    </nav>
  </aside>

  <main class="conteudo">

    <h1>Adicionar Produto</h1>

    <div class="formulario">
      <input type="text" id="nome" placeholder="Nome do produto">
      <input type="text" id="preco" placeholder="Preço">
      <textarea
    id="descricao"
    placeholder="Descrição do produto"
    rows="3">
</textarea>

      <div class="file-upload">
        <label for="imagemProduto" class="btn-secondary">Selecionar Foto</label>
        <input type="file" id="imagemProduto" accept="image/*" style="display: none;">
        <img id="previewProduto" src="" alt="Prévia do produto" style="display: none; max-width: 180px; margin-top: 10px;">
      </div>

      <button id="adicionar">
        Adicionar Produto
      </button>
    </div>

    <h2>Produtos</h2>
    <div id="lista-produtos"></div>

    <h2>Pedidos Recebidos</h2>
    <div id="pedidos"></div>

  </main>

</div>

<script src="../js/cardapio-admin.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
