<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keru</title>
  <link rel="icon" href="../images/isotipo-keru-nobg.png">
  <link rel="stylesheet" href="../css/cardapio.css">
</head>
<body>

<div class="user-container">
  <aside class="sidebar">
    <a class="back-link" href="../login.html"><img class="back" src="../images/button-exit-nobg.png" alt="sair"></a>

    <nav class="menu-list">
      <button data-target="cardapio-section" class="active">Cardápio</button>
      <button data-target="carrinho-section">Carrinho</button>
      <button data-target="checkout-section">Finalizar</button>
      <a href="perfil-usuario.html"><button data-target="perfil-section">Perfil</button></a>
    </nav>
  </aside>

  <main class="conteudo user-conteudo">
    <section id="cardapio-section" class="tab-section active">
      <div class="page-header">
        <h2>Cardápio</h2>
      </div>

      <div id="cardapio" class="cardapio-grid"></div>
    </section>

    <section id="carrinho-section" class="tab-section">
      <div class="page-header">
        <h2>Carrinho</h2>
      </div>

      <div id="carrinho" class="carrinho-list"></div>

      <button id="finalizar">
        Finalizar Pedido
      </button>
    </section>

    <section id="checkout-section" class="tab-section">
      <div class="page-header">
        <h2>Finalizar Pagamento</h2>
      </div>

      <div class="checkout-box">
        <p>Revise seu pedido antes de confirmar o pagamento.</p>
        <ul id="checkout-items"></ul>
        <div class="checkout-total"></div>
        <button id="confirmar-pagamento">
          Confirmar Pagamento
        </button>
      </div>
    </section>
    
  </main>
</div>

<script src="../js/cardapio-user.js"></script>
</body>
</html>
