<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keru</title>
    <link rel="icon" href="../images/isotipo-keru-nobg.png">
    <link rel="stylesheet" href="../css/style-login.css">
</head>
<body>
    <div class="login">
        <a class="back-link" href="../login.html"><img class="back" src="../images/volte.png" alt="Volte"></a>
        <div class="img-logo">
            <img src="../images/logotipo-keru-nobg.png" alt="Keru Logo">
        </div>
        <div class="select-box">
            <h3>Digite o nome do restaurante</h3>
            <form id="restaurant-name-form" class="form">
                <div class="field">
                    <label for="restaurant-name">Nome do Restaurante:</label>
                    <input id="inputCodigo" type="text" maxlength="50" placeholder="Ex: Restaurante Bom Sabor" required>
                </div>
                <div class="opt-login">
                    <button type="button" onclick="acessarCardapio()">Mostrar Restaurante</button>
                </div>
            </form>
            <div id="restaurant-result" class="form" style="display:none;">
                <p id="restaurant-message"></p>
            </div>
            <small>Todos os Direitos Reservados © KERU</small>
        </div>
    </div>

    <script>
        

    function acessarCardapio() {
        const nomeRestaurante = document.getElementById("inputCodigo").value.trim().toLowerCase();

        if (!nomeRestaurante) {
            alert("Digite o nome do restaurante!");
            return;
        }

        const estabelecimentos = JSON.parse(localStorage.getItem("estabelecimentos")) || [];
        const restaurante = estabelecimentos.find(r => (r.nomeR || "").toLowerCase() === nomeRestaurante);

        if (!restaurante) {
            const result = document.getElementById("restaurant-result");
            const msg = document.getElementById("restaurant-message");
            result.style.display = "block";
            msg.textContent = "Nome do restaurante inválido. Verifique e tente novamente.";
            return;
        }

        localStorage.setItem("restauranteCliente", JSON.stringify(restaurante));
        window.location.href = "cardapio.html";
    }
    </script>
</body>
</html>
