<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keru</title>
    <link rel="icon" href="./images/isotipo-keru-nobg.png">
    <link rel="stylesheet" href="../css/style-login.css">
</head>
<body>
    <div class="login">
        <div class="img-logo">
            <img src="../images/logotipo-keru-nobg.png" alt="Keru Logo">
        </div>
        <div class="select-box">
            <h3>Digite o código do restaurante</h3>
            <form id="restaurant-code-form" class="form">
                <div class="field">
                    <label for="restaurant-code">Código:</label>
                    <input id="restaurant-code" type="text" maxlength="10" placeholder="Ex: 1001" required>
                </div>
                <div class="opt-login">
                    <button type="submit">Mostrar Restaurante</button>
                </div>
            </form>
            <div id="restaurant-result" class="form" style="display:none;">
                <p id="restaurant-message"></p>
            </div>
            <small>Todos os Direitos Reservados © KERU</small>
        </div>
    </div>

    <script>
        const restaurantes = {
            '1001': 'Ke fome',
            '1002': 'Cantina da Rua',
            '1003': 'Delícias do Chef',
            '1004': 'Grill & Temperos'
        };

        const form = document.getElementById('restaurant-code-form');
        const input = document.getElementById('restaurant-code');
        const result = document.getElementById('restaurant-result');
        const message = document.getElementById('restaurant-message');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const code = input.value.trim();
            const restaurantName = restaurantes[code];

            if (restaurantName) {
                message.textContent = `Restaurante encontrado: ${restaurantName}`;
                message.style.color = '#c65800';
            } else {
                message.textContent = 'Código não encontrado. Verifique e tente novamente.';
                message.style.color = '#d12d2d';
            }

            result.style.display = 'block';
        });
    </script>
</body>
</html>
