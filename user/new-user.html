<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keru</title>
    <link rel="icon" href="../images/isotipo-keru-nobg.png">

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style-login.css">
</head>
<body>
    <div class="login">
        <a href="/login.html"><img class="back" src="../images/volte.png" alt=""></a>
        <div class="img-logo">
            <img src="../images/logotipo-keru-nobg.png" alt="">
        </div>
        <div class="select-box">
            <h3>Cadastrar-se</h3>
            <div class="form">
                <div class="field">
                    <label for="inputNome">Nome</label>
                    <input id="inputNome" type="nome" placeholder="Digite seu nome">
                </div>
                <div class="field">
                    <label for="inputEmail">Email</label>
                    <input id="inputEmail" type="email" placeholder="Digite seu email">
                </div>
                <div class="field">
                    <label for="inputCPF">CPF</label>
                    <input id="inputCPF" type="text" placeholder="000.000.000-00" maxlength="14" oninput="formatarCPF(this)">
                </div>
            </div>
            <div class="opt-login">
                <button style="margin-top: 10px;" onclick="cadastrar()">Vamos!</button>
            </div>
            <small>Todos os Direitos Reservados &copy; KERU</small>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
